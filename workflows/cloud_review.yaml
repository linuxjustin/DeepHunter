name: Cloud Security Review
description: Workflow for cloud infrastructure security investigation
version: "1.0"
tags:
  - cloud
  - aws
  - gcp
  - azure

steps:
  - id: load_scope
    name: Load Scope
    type: builtin
    action: load_scope
    config:
      in_scope:
        - "https://cloud-target.example.com"
      technologies:
        - "aws"
        - "s3"
        - "lambda"

  - id: import_recon
    name: Import Recon
    type: builtin
    action: import_recon
    depends_on:
      - load_scope

  - id: identify_technologies
    name: Identify Technologies
    type: builtin
    action: identify_technologies
    depends_on:
      - import_recon

  - id: select_knowledge_packs
    name: Select Knowledge Packs
    type: builtin
    action: select_knowledge_packs
    depends_on:
      - identify_technologies

  - id: select_methodology
    name: Select Methodology
    type: builtin
    action: select_methodology
    depends_on:
      - identify_technologies

  - id: generate_plan
    name: Generate Plan
    type: builtin
    action: generate_plan
    depends_on:
      - select_knowledge_packs
      - select_methodology

  - id: collect_evidence
    name: Collect Evidence
    type: builtin
    action: collect_evidence
    depends_on:
      - generate_plan

  - id: draft_report
    name: Draft Report
    type: builtin
    action: draft_report
    depends_on:
      - collect_evidence
